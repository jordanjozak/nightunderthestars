<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Night Under the Stars — You're on the list</title>
<meta name="robots" content="noindex" />
<link rel="icon" type="image/svg+xml" href="assets/logo/star.svg" />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Montserrat:wght@300;400&display=swap" rel="stylesheet" />
<style>
  :root { --bg:#0b0b12; --ink:#f1eee6; --ink-soft:#c5c1b5; --ink-mute:#807b6e; --gold:#b08c55; --gold-bright:#cfa96e; --gold-faint:rgba(176,140,85,.2); }
  *{box-sizing:border-box;margin:0;padding:0}
  body{ font-family:'Montserrat',sans-serif; font-weight:300; background:var(--bg); color:var(--ink); min-height:100vh; display:flex; flex-direction:column; justify-content:center; align-items:center; text-align:center; padding:40px 28px; }
  .star{ height:64px; width:auto; margin-bottom:36px; filter:brightness(1.7) drop-shadow(0 0 18px rgba(176,140,85,.4)); }
  h1{ font-family:'Cormorant Garamond',serif; font-weight:300; font-size:clamp(30px,5vw,44px); letter-spacing:.05em; margin-bottom:20px; }
  p{ font-family:'Cormorant Garamond',serif; font-style:italic; font-size:18px; line-height:1.65; color:var(--ink-soft); max-width:440px; }
  a{ display:inline-block; margin-top:44px; padding:14px 40px; border:1px solid var(--gold-faint); color:var(--ink-soft); font-size:10.5px; letter-spacing:.36em; text-transform:uppercase; text-decoration:none; transition:all .4s ease; }
  a:hover{ border-color:var(--gold); color:var(--ink); }
</style>
</head>
<body>
  <img class="star" src="assets/logo/star.svg" alt="" />
  <h1>You&rsquo;re on the list.</h1>
  <p>When the next night opens, you&rsquo;ll be the first to know. Until then &mdash; keep looking up.</p>
  <a href="/">Return</a>
</body>
</html>
